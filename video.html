<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M. Junaid Ashraf — Video Introduction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #C9A97A;
      --bg: #0a0a0a;
      --text: #f5f0e8;
      --text-muted: rgba(245,240,232,0.55);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .back-link {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 1; }
    .back-link svg { width: 16px; height: 16px; }

    .wrapper {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      text-align: center;
      line-height: 1.15;
    }

    h1 span { color: var(--accent); }

    .sub {
      color: var(--text-muted);
      font-size: 1rem;
      text-align: center;
      max-width: 480px;
    }

    .video-shell {
      width: 100%;
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(201,169,122,0.18);
      box-shadow: 0 8px 48px rgba(0,0,0,0.6);
      position: relative;
      aspect-ratio: 16/9;
    }

    .video-shell iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #0a0a0a;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: opacity 0.2s;
    }
    .cta:hover { opacity: 0.88; }
  </style>
</head>
<body>

  <a href="index.html" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back to Portfolio
  </a>

  <div class="wrapper">
    <div class="label">Video Introduction</div>
    <h1>Meet <span>M. Junaid Ashraf</span></h1>
    <p class="sub">Project Manager · Digital Marketer · 8+ years delivering results globally</p>

    <div class="video-shell">
      <iframe
        src="https://app.heygen.com/embeds/e09daac327b144fd850560edfa841022"
        title="M. Junaid Ashraf — Video Introduction"
        allow="autoplay; fullscreen"
        allowfullscreen
      ></iframe>
    </div>

    <a href="index.html#contact" class="cta">
      Work With Me
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </a>
  </div>

</body>
</html>
