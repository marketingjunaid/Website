<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="cs-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f1c2e"/>
      <stop offset="55%"  stop-color="#162540"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
    <linearGradient id="cs-shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f0c020" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#f0c020" stop-opacity="0.8"/>
      <stop offset="60%"  stop-color="#f0c020" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f0c020" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="cs-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%"   stop-color="#f0c020" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f0c020" stop-opacity="0"/>
    </radialGradient>
    <filter id="cs-icon-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#f0c020" flood-opacity="0.5"/>
    </filter>
    <filter id="cs-text-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#f0c020" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="340" fill="url(#cs-bg)"/>
  <ellipse cx="300" cy="155" rx="270" ry="160" fill="url(#cs-glow)"/>

  <!-- Subtle grid lines -->
  <g stroke="#f0c020" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="60"  x2="600" y2="60"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
  </g>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.4">
    <circle cx="60"  cy="22" r="0.8"/>
    <circle cx="150" cy="14" r="0.6"/>
    <circle cx="420" cy="18" r="0.7"/>
    <circle cx="540" cy="26" r="0.8"/>
    <circle cx="88"  cy="50" r="0.5"/>
    <circle cx="480" cy="40" r="0.6"/>
  </g>

  <!-- Briefcase / Building icon centered -->
  <g transform="translate(300,118)" filter="url(#cs-icon-glow)">
    <!-- Building icon -->
    <rect x="-28" y="-30" width="56" height="58" rx="3" fill="#f0c020" opacity="0.85"/>
    <!-- Door -->
    <rect x="-8" y="14" width="16" height="14" rx="2" fill="#0f1c2e"/>
    <!-- Windows -->
    <rect x="-22" y="-22" width="10" height="9" rx="1.5" fill="#0f1c2e" opacity="0.8"/>
    <rect x="-6"  y="-22" width="10" height="9" rx="1.5" fill="#0f1c2e" opacity="0.8"/>
    <rect x="10"  y="-22" width="10" height="9" rx="1.5" fill="#0f1c2e" opacity="0.8"/>
    <rect x="-22" y="-8"  width="10" height="9" rx="1.5" fill="#0f1c2e" opacity="0.8"/>
    <rect x="-6"  y="-8"  width="10" height="9" rx="1.5" fill="#0f1c2e" opacity="0.8"/>
    <rect x="10"  y="-8"  width="10" height="9" rx="1.5" fill="#0f1c2e" opacity="0.8"/>
    <!-- Rooftop accent -->
    <rect x="-18" y="-36" width="36" height="8" rx="2" fill="#f0c020" opacity="0.6"/>
    <rect x="-6"  y="-44" width="12" height="10" rx="2" fill="#f0c020" opacity="0.5"/>
  </g>

  <!-- Decorative frame -->
  <rect x="140" y="60" width="320" height="210" rx="4" fill="none" stroke="#f0c020" stroke-width="0.6" stroke-opacity="0.18"/>
  <rect x="148" y="68" width="304" height="194" rx="3" fill="none" stroke="#f0c020" stroke-width="0.4" stroke-opacity="0.1"/>

  <!-- Company name — CENTERED like other cards -->
  <text x="300" y="208" font-family="Georgia, 'Times New Roman', serif"
        font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle"
        letter-spacing="2" filter="url(#cs-text-glow)">Consultiva Services</text>

  <!-- Accent dots -->
  <g fill="#f0c020" opacity="0.6">
    <circle cx="200" cy="208" r="2"/>
    <circle cx="195" cy="208" r="1.2"/>
    <circle cx="405" cy="208" r="2"/>
    <circle cx="410" cy="208" r="1.2"/>
  </g>

  <!-- Tagline -->
  <text x="300" y="230" font-family="'Segoe UI', Arial, sans-serif"
        font-size="10" font-weight="400" fill="rgba(240,192,32,0.75)" text-anchor="middle"
        letter-spacing="1.5" font-style="italic">From Setup to Success — We've Got You Covered</text>

  <!-- Location -->
  <text x="300" y="252" font-family="'Segoe UI', Arial, sans-serif"
        font-size="9.5" font-weight="400" fill="rgba(255,255,255,0.3)" text-anchor="middle"
        letter-spacing="1">Business Consultancy · UAE</text>

  <!-- Divider -->
  <rect x="120" y="263" width="360" height="1" fill="url(#cs-shimmer)" opacity="0.5"/>

  <!-- Bottom bar -->
  <rect x="0" y="290" width="600" height="50" fill="rgba(6,13,20,0.95)"/>
  <rect x="0" y="290" width="600" height="1" fill="url(#cs-shimmer)" opacity="0.5"/>

  <!-- Chips -->
  <rect x="28" y="305" width="112" height="22" rx="11" fill="rgba(240,192,32,0.12)" stroke="#f0c020" stroke-width="0.8" opacity="0.85"/>
  <text x="84" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="600" text-anchor="middle" fill="#f0c020" letter-spacing="0.5">Company Formation</text>

  <rect x="150" y="305" width="100" height="22" rx="11" fill="rgba(240,192,32,0.12)" stroke="#f0c020" stroke-width="0.8" opacity="0.85"/>
  <text x="200" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="600" text-anchor="middle" fill="#f0c020" letter-spacing="0.5">Banking Setup</text>

  <rect x="260" y="305" width="86" height="22" rx="11" fill="rgba(240,192,32,0.12)" stroke="#f0c020" stroke-width="0.8" opacity="0.85"/>
  <text x="303" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="600" text-anchor="middle" fill="#f0c020" letter-spacing="0.5">Licensing</text>

  <rect x="356" y="305" width="82" height="22" rx="11" fill="rgba(240,192,32,0.12)" stroke="#f0c020" stroke-width="0.8" opacity="0.85"/>
  <text x="397" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="600" text-anchor="middle" fill="#f0c020" letter-spacing="0.5">Branding</text>

  <rect x="448" y="305" width="126" height="22" rx="11" fill="rgba(240,192,32,0.12)" stroke="#f0c020" stroke-width="0.8" opacity="0.85"/>
  <text x="511" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="600" text-anchor="middle" fill="#f0c020" letter-spacing="0.5">20 Years Experience</text>

  <!-- Top accent -->
  <rect x="0" y="0" width="600" height="2" fill="url(#cs-shimmer)"/>

  <!-- Corner brackets -->
  <g stroke="#f0c020" stroke-width="1.2" fill="none" opacity="0.4">
    <path d="M 18 18 L 18 36"/><path d="M 18 18 L 36 18"/>
    <path d="M 582 288 L 582 270"/><path d="M 582 288 L 564 288"/>
  </g>
</svg>
