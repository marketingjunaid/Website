<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="sec-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a3a2a"/>
      <stop offset="55%"  stop-color="#1f4a34"/>
      <stop offset="100%" stop-color="#0f2a1e"/>
    </linearGradient>
    <linearGradient id="sec-shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#5fbd8a" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#5fbd8a" stop-opacity="0.7"/>
      <stop offset="60%"  stop-color="#5fbd8a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#5fbd8a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sec-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%"   stop-color="#3da86a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3da86a" stop-opacity="0"/>
    </radialGradient>
    <filter id="sec-glow-filter">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#5fbd8a" flood-opacity="0.55"/>
    </filter>
    <filter id="sec-text-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#5fbd8a" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="340" fill="url(#sec-bg)"/>
  <ellipse cx="300" cy="150" rx="270" ry="160" fill="url(#sec-glow)"/>

  <!-- Subtle dot pattern -->
  <g fill="#ffffff" opacity="0.03">
    <circle cx="60"  cy="40"  r="80"/>
    <circle cx="540" cy="60"  r="80"/>
    <circle cx="80"  cy="300" r="60"/>
    <circle cx="520" cy="290" r="60"/>
  </g>

  <!-- Heart with care hands icon -->
  <g transform="translate(300,115)" filter="url(#sec-glow-filter)">
    <!-- Heart shape -->
    <path d="M0,32 C-40,8 -52,-20 -36,-34 C-24,-46 -8,-42 0,-28 C8,-42 24,-46 36,-34 C52,-20 40,8 0,32 Z"
          fill="#5fbd8a" opacity="0.9"/>
    <!-- Inner lighter heart highlight -->
    <path d="M0,20 C-24,4 -32,-12 -22,-22 C-14,-30 -4,-26 0,-16 C4,-26 14,-30 22,-22 C32,-12 24,4 0,20 Z"
          fill="#ffffff" opacity="0.15"/>
    <!-- Person/hands silhouette inside -->
    <circle cx="0" cy="-6" r="8" fill="#ffffff" opacity="0.7"/>
    <path d="M-12,14 Q-6,6 0,6 Q6,6 12,14" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Brand name -->
  <text x="300" y="192" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="700" fill="#5fbd8a" text-anchor="middle"
        letter-spacing="3" filter="url(#sec-text-glow)">SMART</text>
  <text x="300" y="216" font-family="'Segoe UI', Arial, sans-serif"
        font-size="22" font-weight="900" fill="#ffffff" text-anchor="middle"
        letter-spacing="1" filter="url(#sec-text-glow)">Elderly Care</text>

  <!-- Tagline -->
  <text x="300" y="240" font-family="'Segoe UI', Arial, sans-serif"
        font-size="10.5" font-weight="400" fill="rgba(255,255,255,0.55)" text-anchor="middle"
        letter-spacing="1" font-style="italic">Care that feels like family</text>

  <!-- UK flag hint (small) -->
  <g transform="translate(288,252)">
    <rect x="0" y="0" width="24" height="14" rx="2" fill="none" stroke="rgba(95,189,138,0.4)" stroke-width="0.8"/>
    <text x="12" y="11" font-family="serif" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.5)">🇬🇧</text>
  </g>
  <text x="320" y="262" font-family="'Segoe UI', Arial, sans-serif"
        font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="0.5">United Kingdom</text>

  <!-- Divider -->
  <rect x="100" y="272" width="400" height="1" fill="url(#sec-shimmer)" opacity="0.5"/>

  <!-- Bottom bar -->
  <rect x="0" y="290" width="600" height="50" fill="rgba(10,28,20,0.9)"/>
  <rect x="0" y="290" width="600" height="1" fill="url(#sec-shimmer)" opacity="0.5"/>

  <!-- Chips -->
  <rect x="22" y="305" width="100" height="22" rx="11" fill="rgba(95,189,138,0.12)" stroke="#5fbd8a" stroke-width="0.8" opacity="0.85"/>
  <text x="72" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="600" text-anchor="middle" fill="#5fbd8a" letter-spacing="0.5">Branding</text>

  <rect x="132" y="305" width="120" height="22" rx="11" fill="rgba(95,189,138,0.12)" stroke="#5fbd8a" stroke-width="0.8" opacity="0.85"/>
  <text x="192" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="600" text-anchor="middle" fill="#5fbd8a" letter-spacing="0.5">Web Development</text>

  <rect x="262" y="305" width="88" height="22" rx="11" fill="rgba(95,189,138,0.12)" stroke="#5fbd8a" stroke-width="0.8" opacity="0.85"/>
  <text x="306" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="600" text-anchor="middle" fill="#5fbd8a" letter-spacing="0.5">Elder Care</text>

  <rect x="360" y="305" width="96" height="22" rx="11" fill="rgba(95,189,138,0.12)" stroke="#5fbd8a" stroke-width="0.8" opacity="0.85"/>
  <text x="408" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="600" text-anchor="middle" fill="#5fbd8a" letter-spacing="0.5">Live-in Care</text>

  <rect x="466" y="305" width="112" height="22" rx="11" fill="rgba(95,189,138,0.12)" stroke="#5fbd8a" stroke-width="0.8" opacity="0.85"/>
  <text x="522" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="600" text-anchor="middle" fill="#5fbd8a" letter-spacing="0.5">CQC Certified</text>

  <!-- Top accent -->
  <rect x="0" y="0" width="600" height="2" fill="url(#sec-shimmer)"/>

  <!-- Corner brackets -->
  <g stroke="#5fbd8a" stroke-width="1.2" fill="none" opacity="0.4">
    <path d="M 18 18 L 18 36"/><path d="M 18 18 L 36 18"/>
    <path d="M 582 288 L 582 270"/><path d="M 582 288 L 564 288"/>
  </g>
</svg>
