<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="db-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a2a5c"/>
      <stop offset="60%"  stop-color="#0d3a7a"/>
      <stop offset="100%" stop-color="#082050"/>
    </linearGradient>
    <linearGradient id="db-shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4da6ff" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#4da6ff" stop-opacity="0.7"/>
      <stop offset="60%"  stop-color="#4da6ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4da6ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="db-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#2a7fff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2a7fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="db-text-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4da6ff" flood-opacity="0.5"/>
    </filter>
    <filter id="db-icon-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#4da6ff" flood-opacity="0.6"/>
    </filter>
    <clipPath id="db-circle-clip">
      <circle cx="300" cy="145" r="72"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="340" fill="url(#db-bg)"/>

  <!-- Subtle glow center -->
  <ellipse cx="300" cy="160" rx="280" ry="160" fill="url(#db-glow)"/>

  <!-- Decorative grid lines (subtle) -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="85" x2="600" y2="85"/>
    <line x1="0" y1="170" x2="600" y2="170"/>
    <line x1="0" y1="255" x2="600" y2="255"/>
    <line x1="150" y1="0" x2="150" y2="340"/>
    <line x1="300" y1="0" x2="300" y2="340"/>
    <line x1="450" y1="0" x2="450" y2="340"/>
  </g>

  <!-- Circle background for icon -->
  <circle cx="300" cy="120" r="72" fill="rgba(255,255,255,0.06)" stroke="rgba(77,166,255,0.3)" stroke-width="1.5"/>

  <!-- Tooth icon (stylized) -->
  <g transform="translate(300,120)" filter="url(#db-icon-glow)">
    <!-- Main tooth shape -->
    <path d="M-22,-30 C-22,-38 -14,-44 -6,-44 C-2,-44 2,-42 6,-44 C14,-44 22,-38 22,-30
             C22,-18 18,-6 16,6 C14,18 12,32 8,36 C6,40 2,42 0,42
             C-2,42 -6,40 -8,36 C-12,32 -14,18 -16,6 C-18,-6 -22,-18 -22,-30 Z"
          fill="#ffffff" opacity="0.92"/>
    <!-- Root divider hint -->
    <line x1="0" y1="10" x2="0" y2="36" stroke="rgba(77,166,255,0.4)" stroke-width="1.5"/>
    <!-- Smile arc on tooth -->
    <path d="M-8,0 Q0,8 8,0" stroke="rgba(13,58,122,0.6)" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Braces on tooth (small wires) -->
  <g transform="translate(300,120)" fill="none" stroke="#4da6ff" stroke-width="1.5" opacity="0.8">
    <rect x="-12" y="-14" width="7" height="5" rx="1.5" fill="rgba(77,166,255,0.3)" stroke="#4da6ff"/>
    <rect x="-2" y="-15" width="7" height="5" rx="1.5" fill="rgba(77,166,255,0.3)" stroke="#4da6ff"/>
    <rect x="8" y="-14" width="7" height="5" rx="1.5" fill="rgba(77,166,255,0.3)" stroke="#4da6ff"/>
    <line x1="-12" y1="-11.5" x2="15" y2="-11.5" stroke="#4da6ff" stroke-width="1"/>
  </g>

  <!-- Brand name -->
  <text x="300" y="222" font-family="'Segoe UI', Arial, sans-serif"
        font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle"
        letter-spacing="2" filter="url(#db-text-glow)">DocBraces</text>

  <!-- Tagline -->
  <text x="300" y="246" font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" font-weight="400" fill="rgba(77,166,255,0.9)" text-anchor="middle"
        letter-spacing="1.5" font-style="italic">Canada's Largest Orthodontic Network</text>

  <!-- Divider -->
  <rect x="100" y="262" width="400" height="1" fill="url(#db-shimmer)" opacity="0.6"/>

  <!-- Service chips -->
  <rect x="0" y="290" width="600" height="50" fill="rgba(8,32,80,0.9)"/>
  <rect x="0" y="290" width="600" height="1" fill="url(#db-shimmer)" opacity="0.5"/>

  <!-- Chip 1 -->
  <rect x="28" y="305" width="90" height="22" rx="11" fill="rgba(77,166,255,0.12)" stroke="#4da6ff" stroke-width="0.8" opacity="0.85"/>
  <text x="73" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="600" text-anchor="middle" fill="#4da6ff" letter-spacing="0.5">Branding</text>

  <!-- Chip 2 -->
  <rect x="128" y="305" width="120" height="22" rx="11" fill="rgba(77,166,255,0.12)" stroke="#4da6ff" stroke-width="0.8" opacity="0.85"/>
  <text x="188" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="600" text-anchor="middle" fill="#4da6ff" letter-spacing="0.5">Web Development</text>

  <!-- Chip 3 -->
  <rect x="258" y="305" width="84" height="22" rx="11" fill="rgba(77,166,255,0.12)" stroke="#4da6ff" stroke-width="0.8" opacity="0.85"/>
  <text x="300" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="600" text-anchor="middle" fill="#4da6ff" letter-spacing="0.5">Orthodontics</text>

  <!-- Chip 4 -->
  <rect x="352" y="305" width="96" height="22" rx="11" fill="rgba(77,166,255,0.12)" stroke="#4da6ff" stroke-width="0.8" opacity="0.85"/>
  <text x="400" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="600" text-anchor="middle" fill="#4da6ff" letter-spacing="0.5">40+ Clinics</text>

  <!-- Chip 5 -->
  <rect x="458" y="305" width="116" height="22" rx="11" fill="rgba(77,166,255,0.12)" stroke="#4da6ff" stroke-width="0.8" opacity="0.85"/>
  <text x="516" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="600" text-anchor="middle" fill="#4da6ff" letter-spacing="0.5">Canada-wide</text>

  <!-- Top accent line -->
  <rect x="0" y="0" width="600" height="2" fill="url(#db-shimmer)"/>

  <!-- Corner brackets -->
  <g stroke="#4da6ff" stroke-width="1.2" fill="none" opacity="0.4">
    <path d="M 18 18 L 18 36"/><path d="M 18 18 L 36 18"/>
    <path d="M 582 288 L 582 270"/><path d="M 582 288 L 564 288"/>
  </g>
</svg>
