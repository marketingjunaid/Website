<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <!-- Deep stage background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0a1a"/>
      <stop offset="60%"  stop-color="#130d24"/>
      <stop offset="100%" stop-color="#0a0814"/>
    </linearGradient>

    <!-- Spotlight glow from above -->
    <radialGradient id="spotlight" cx="50%" cy="0%" r="70%">
      <stop offset="0%"   stop-color="#fff9e0" stop-opacity="0.18"/>
      <stop offset="60%"  stop-color="#ffe57a" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffe57a" stop-opacity="0"/>
    </radialGradient>

    <!-- Ball gradients -->
    <radialGradient id="ball-red" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#ff7a7a"/>
      <stop offset="100%" stop-color="#c0152a"/>
    </radialGradient>
    <radialGradient id="ball-yellow" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#ffe97a"/>
      <stop offset="100%" stop-color="#e0a800"/>
    </radialGradient>
    <radialGradient id="ball-blue" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#7ab8ff"/>
      <stop offset="100%" stop-color="#1560c0"/>
    </radialGradient>
    <radialGradient id="ball-green" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#7affc0"/>
      <stop offset="100%" stop-color="#0d9e60"/>
    </radialGradient>
    <radialGradient id="ball-purple" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#d07aff"/>
      <stop offset="100%" stop-color="#7010c0"/>
    </radialGradient>

    <!-- Shimmer line -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffe57a" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#ffe57a" stop-opacity="0.7"/>
      <stop offset="70%"  stop-color="#ffe57a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffe57a" stop-opacity="0"/>
    </linearGradient>

    <filter id="ball-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffe57a" flood-opacity="0.6"/>
    </filter>
    <filter id="star-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#ffffff" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="340" fill="url(#bg)"/>

  <!-- Stage spotlight from top -->
  <ellipse cx="300" cy="0" rx="240" ry="200" fill="url(#spotlight)"/>

  <!-- Curtain hints on sides -->
  <path d="M 0 0 Q 40 80 20 200 Q 10 280 0 340 L 0 0 Z" fill="#2a0a2a" opacity="0.5"/>
  <path d="M 600 0 Q 560 80 580 200 Q 590 280 600 340 L 600 0 Z" fill="#2a0a2a" opacity="0.5"/>

  <!-- Stars scattered -->
  <g fill="#ffffff" filter="url(#star-glow)" opacity="0.7">
    <circle cx="80"  cy="30"  r="1.2"/>
    <circle cx="155" cy="18"  r="0.8"/>
    <circle cx="220" cy="40"  r="1"/>
    <circle cx="380" cy="22"  r="1.2"/>
    <circle cx="450" cy="38"  r="0.9"/>
    <circle cx="520" cy="15"  r="1.1"/>
    <circle cx="540" cy="55"  r="0.7"/>
    <circle cx="60"  cy="75"  r="0.8"/>
    <circle cx="110" cy="110" r="0.7"/>
    <circle cx="490" cy="90"  r="0.9"/>
  </g>

  <!-- Juggling arc paths (parabolic arcs showing ball trajectories) -->
  <g fill="none" stroke-width="1.2" opacity="0.22">
    <!-- Left arc -->
    <path d="M 160 260 Q 180 80 300 100" stroke="#ff7a7a"/>
    <!-- Center arc -->
    <path d="M 220 260 Q 300 40  380 260" stroke="#ffe97a"/>
    <!-- Right arc -->
    <path d="M 300 100 Q 420 80 440 260" stroke="#7ab8ff"/>
    <!-- Extra arcs -->
    <path d="M 140 260 Q 220 60  350 90"  stroke="#d07aff"/>
    <path d="M 250 260 Q 300 30  360 260" stroke="#7affc0"/>
  </g>

  <!-- Juggling balls -->
  <!-- Ball 1 — red, top left arc -->
  <circle cx="185" cy="88"  r="18" fill="url(#ball-red)"    filter="url(#ball-glow)"/>
  <ellipse cx="179" cy="83" rx="5" ry="3" fill="rgba(255,255,255,0.35)" transform="rotate(-20,179,83)"/>

  <!-- Ball 2 — yellow, top center -->
  <circle cx="300" cy="58"  r="21" fill="url(#ball-yellow)" filter="url(#ball-glow)"/>
  <ellipse cx="293" cy="52" rx="6" ry="3.5" fill="rgba(255,255,255,0.35)" transform="rotate(-20,293,52)"/>

  <!-- Ball 3 — blue, top right arc -->
  <circle cx="415" cy="88"  r="18" fill="url(#ball-blue)"   filter="url(#ball-glow)"/>
  <ellipse cx="409" cy="83" rx="5" ry="3" fill="rgba(255,255,255,0.35)" transform="rotate(-20,409,83)"/>

  <!-- Ball 4 — green, lower left -->
  <circle cx="152" cy="218" r="15" fill="url(#ball-green)"  filter="url(#ball-glow)" opacity="0.85"/>
  <ellipse cx="147" cy="213" rx="4" ry="2.5" fill="rgba(255,255,255,0.3)" transform="rotate(-20,147,213)"/>

  <!-- Ball 5 — purple, lower right -->
  <circle cx="448" cy="218" r="15" fill="url(#ball-purple)" filter="url(#ball-glow)" opacity="0.85"/>
  <ellipse cx="443" cy="213" rx="4" ry="2.5" fill="rgba(255,255,255,0.3)" transform="rotate(-20,443,213)"/>

  <!-- Divider -->
  <rect x="120" y="248" width="360" height="1" fill="url(#shimmer)"/>

  <!-- Name -->
  <text x="300" y="283" font-family="'Georgia', 'Times New Roman', serif"
        font-size="30" font-weight="700" text-anchor="middle" letter-spacing="4"
        fill="#fff9e8" filter="url(#text-glow)">JAMES BUSTAR</text>

  <!-- Tagline -->
  <text x="300" y="308" font-family="'Segoe UI', Arial, sans-serif"
        font-size="11.5" font-weight="500" text-anchor="middle" letter-spacing="6"
        fill="#ffe57a" opacity="0.9">COMEDY JUGGLER</text>

  <!-- Top accent line -->
  <rect x="0" y="0" width="600" height="2.5" fill="url(#shimmer)"/>
  <!-- Bottom accent line -->
  <rect x="0" y="337.5" width="600" height="2.5" fill="url(#shimmer)"/>

  <!-- Corner brackets -->
  <g stroke="#ffe57a" stroke-width="1.5" fill="none" opacity="0.35">
    <path d="M 26 26 L 26 52"/><path d="M 26 26 L 52 26"/>
    <path d="M 574 314 L 574 288"/><path d="M 574 314 L 548 314"/>
  </g>
</svg>
